<body class="bg-slate-50 text-slate-800">

                                </div>
                        </div>
                    </div>
                </div>
                
                <div id="company-lists" class="mt-20 space-y-6 relative z-20">

                    </div>

        </section>
        
    </main>

    <script src="search.js"></script>
    <script>
        // --- 上游資料與公司名單 (已區分本國與外國) ---
        const upstreamItems = [
            { id: 'U1', icon: 'fa-microchip', text: '中央處理器', domestic: ['威盛'], foreign: [] },
            { id: 'U2', icon: 'fa-server', text: '晶片組', domestic: ['威盛', '豐藝'], foreign: [] },
            { id: 'U3', icon: 'fa-tv', text: '面板', domestic: ['敦吉', '全台', '豐藝'], foreign: [] },
            { id: 'U4', icon: 'fa-desktop', text: '顯示器模組', domestic: ['技嘉', '憶聲', '全台', '豐藝'], foreign: [] },
            { id: 'U5', icon: 'fa-memory', text: '記憶體', domestic: ['華邦電', '南亞科', '創見', '凌航', '十銓', '宇瞻'], foreign: [] },
            { id: 'U6', icon: 'fa-computer', text: '主機板', domestic: ['金寶', '鴻海', '精英', '華碩', '技嘉', '微星', '威盛', '映泰', '承啟', '百容', '威強電', '華擎', '和碩'], foreign: [] },
            { id: 'U7', icon: 'fa-box', text: '機殼', domestic: ['首利', '光寶科', '鴻海', '鴻準', '技嘉', '可成', '神基', '晟銘電', '全漢', '偉訓', '柏騰', '谷崧', '事欣科', '和碩', '迎廣', '華孚', '勤誠'], foreign: [] },
            { id: 'U8', icon: 'fa-plug', text: '電源供應器', domestic: ['首利', '光寶科', '台達電', '致茂', '技嘉', '群光', '環科', '新巨', '聯昌', '飛宏', '百容', '神基', '全漢', '偉訓', '立德', '聯德', '迎廣', '康舒', '群電'], foreign: [] },
            { id: 'U9', icon: 'fa-network-wired', text: '網路卡', domestic: ['華碩', '互億'], foreign: [] },
            { id: 'U10', icon: 'fa-battery-full', text: '電池', domestic: ['全漢', '禾伸堂'], foreign: [] },
            { id: 'U11', icon: 'fa-fan', text: '散熱片、風扇馬達、散熱模組', domestic: ['台達電', '鴻準', '技嘉', '建準', '敦吉', '奇鋐', '泰碩', '尼得科超眾', '邁科'], foreign: ['聯德控股-KY', '動力-KY'] },
            { id: 'U12', icon: 'fa-sliders', text: '輸出入模組/介面卡', domestic: ['華碩', '微星', '互億'], foreign: [] },
            { id: 'U13', icon: 'fa-microchip', text: '顯示卡', domestic: ['華碩', '技嘉', '微星', '圓剛', '承啟', '麗臺', '華擎'], foreign: [] },
            { id: 'U14', icon: 'fa-hard-drive', text: '硬碟機', domestic: ['金寶', '華碩'], foreign: [] },
            { id: 'U15', icon: 'fa-compact-disc', text: '光碟機', domestic: ['華碩'], foreign: [] },
            { id: 'U16', icon: 'fa-database', text: '磁碟儲存系統', domestic: ['華碩', '普安', '喬鼎'], foreign: [] },
            { id: 'U17', icon: 'fa-code', text: 'BIOS (嵌入式軟體)', domestic: ['華碩'], foreign: [] },
            { id: 'U18', icon: 'fa-usb', text: '隨身碟、記憶卡讀卡機', domestic: ['華碩', '創見', '增你強', '十銓', '互億', '宇瞻'], foreign: [] },
            { id: 'U19', icon: 'fa-video', text: '多功能視訊卡', domestic: ['圓剛'], foreign: [] },
            { id: 'U20', icon: 'fa-camera', text: '光學鏡片、鏡頭', domestic: ['鴻海', '佳能', '敦吉', '百容', '大立光', '亞光', '華晶科', '玉晶光', '揚明光', '佳凌', '今國光', '中揚光', '澤米'], foreign: [] },
            { id: 'U21', icon: 'fa-compact-disc', text: '光碟片', domestic: ['中環', '錸德', '吉祥全', '鈺德'], foreign: [] },
            { id: 'U22', icon: 'fa-link', text: '連接線', domestic: ['廣宇', '正崴', '太空梭', '敦吉', '百容', '今皓', '信邦', '鴻碩', '聯穎', '鎰勝', '詮欣', '瀚荃'], foreign: ['貿聯-KY'] },
            { id: 'U23', icon: 'fa-layer-group', text: '機構樞紐', domestic: ['信錦', '新日興', '鑫禾', '富世達'], foreign: [] },
            { id: 'U24', icon: 'fa-cubes', text: '金屬、塑膠模具', domestic: ['信錦', '鴻海', '鴻準', '敦吉', '百容', '揚明光', '新至陞', '銘鈺', '佳凌', '詮欣', '華孚'], foreign: [] },
            { id: 'U25', icon: 'fa-puzzle-piece', text: '其他電腦及週邊設備之零組件', domestic: ['廣隆', '永光', '川湖', '廣宇', '佳世達', '大同', '廣達', '群光', '精元', '正崴', '圓剛', '新巨', '美律', '兆勁', '義隆', '敦吉', '大毅', '百容', '華立', '威強電', '憶聲', '禾伸堂', '建碁', '立德', '銘異', '勝德', '泰碩', '揚明光', '力銘', '新至陞', '大眾控', '銘鈺', '致伸', '上福', '聚鼎', '淳安', '旭隼', '伊雲谷', '安普新', '達方', '菱光', '羅昇'], foreign: ['貿聯-KY', '茂林-KY', '科嘉-KY'] }
        ];

        // --- 下游資料與公司名單 (已區分本國與外國) ---
        const downstreamItems = [
            { id: 'D1', icon: 'fa-laptop', text: '筆記型電腦', domestic: ['台達電', '鴻海', '仁寶', '精英', '宏碁', '英業達', '華碩', '藍天', '倫飛', '大同', '技嘉', '微星', '廣達', '燦坤', '百容', '神基', '緯創', '和碩'], foreign: [] },
            { id: 'D2', icon: 'fa-computer', text: '桌上型電腦', domestic: ['台達電', '鴻海', '精英', '宏碁', '華碩', '大同', '技嘉', '微星', '輔信', '燦坤', '緯創', '和碩'], foreign: [] },
            { id: 'D3', icon: 'fa-laptop-code', text: '精簡型電腦', domestic: ['台達電', '華碩', '倫飛', '技嘉', '鼎元', '燦坤', '麗臺', '百容'], foreign: [] },
            { id: 'D4', icon: 'fa-print', text: '印表機、傳真機、掃瞄器、多功能事務機、投影機', domestic: ['全友', '金寶', '鴻海', '佳世達', '宏碁', '大同', '虹光', '燦坤', '百容', '亞光', '永崴投控', '致伸', '天瀚'], foreign: [] },
            { id: 'D5', icon: 'fa-industry', text: '工業電腦', domestic: ['仁寶', '佳世達', '倫飛', '技嘉', '微星', '研華', '友通', '輔信', '百容', '歐格', '神基', '威強電', '融程電', '華擎', '精聯', '大眾控', '事欣科', '凌華', '飛捷', '樺漢', '研揚', '攸泰科技'], foreign: [] },
            { id: 'D6', icon: 'fa-server', text: '伺服器', domestic: ['光寶科', '鴻海', '仁寶', '佳世達', '宏碁', '華碩', '大同', '技嘉', '微星', '承啟', '燦坤', '華擎', '神達', '緯穎', '永擎'], foreign: [] },
            { id: 'D7', icon: 'fa-shield-halved', text: '安全監控系統', domestic: ['士電', '光寶科', '台達電', '鴻海', '佳世達', '大同', '圓剛', '隴華', '百容', '普安', '歐格', '喬鼎', '奇偶', '晶睿', '慧友', '鈞泰'], foreign: [] },
            { id: 'D8', icon: 'fa-plug', text: '其他電腦及週邊設備', domestic: ['光寶科', '鴻海', '中環', '仁寶', '精英', '佳世達', '宏碁', '華碩', '倫飛', '昆盈', '大同', '技嘉', '微星', '友通', '輔信', '圓剛', '新巨', '承啟', '燦坤', '盟立', '百容', '歐格', '威強電', '建碁', '喬鼎', '緯創', '誠研', '碩天', '圓展', '神達', '致伸', '事欣科', '虹堡', '亞弘電', '天瀚', '宏正', '研揚', '振樺電', '偉聯'], foreign: [] }
        ];

        // 渲染上游選單按鈕
        document.getElementById('upstream-container').innerHTML = upstreamItems.map(item => `
            <div id="cp_link_${item.id}" onclick="toggleCompanyList('companyList_${item.id}')" class="cursor-pointer bg-white border border-slate-200 hover:border-cyan-400 hover:bg-cyan-50 rounded-lg p-2 transition-all flex items-center gap-3 hover:-translate-y-1 shadow-sm">
                <div class="w-8 h-8 rounded-full bg-cyan-50 text-cyan-500 flex items-center justify-center text-sm flex-shrink-0"><i class="fa-solid ${item.icon}"></i></div>
                <div class="text-left"><h6 class="font-bold text-slate-700 text-xs leading-tight">${item.text}</h6></div>
            </div>
        `).join('');

        // 渲染下游選單按鈕
        document.getElementById('downstream-container').innerHTML = downstreamItems.map(item => `
            <div id="cp_link_${item.id}" onclick="toggleCompanyList('companyList_${item.id}')" class="cursor-pointer bg-white border border-slate-200 hover:border-blue-400 hover:bg-blue-50 rounded-lg p-3 transition-all flex items-center gap-3 hover:-translate-y-1 shadow-sm">
                <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg flex-shrink-0"><i class="fa-solid ${item.icon}"></i></div>
                <div class="text-left"><h6 class="font-bold text-slate-700 text-sm leading-tight">${item.text}</h6></div>
            </div>
        `).join('');

        // 生成所有詳細的公司展開面板 (區分本國與外國上市)
        const allPlaceholders = [
            ...upstreamItems.map(item => ({...item, color: 'cyan'})),
            ...downstreamItems.map(item => ({...item, color: 'blue'}))
        ];

        const companyListsHTML = allPlaceholders.map(item => {
            let contentHTML = '';
            let totalCompanies = item.domestic.length + item.foreign.length;

            // 處理本國上市公司
            if (item.domestic.length > 0) {
                const domesticTags = item.domestic.map(company => 
                    `<span class="bg-slate-100 text-slate-600 text-sm px-4 py-1.5 rounded-full border border-transparent font-medium cursor-default select-none">${company}</span>`
                ).join('');
                
                contentHTML += `
                    <div class="mb-6">
                        <div class="text-md font-bold text-slate-600 mb-3 bg-slate-50 p-2 rounded border-l-4 border-${item.color}-400">
                            本國上市公司 (${item.domestic.length}家)
                        </div>
                        <div class="flex flex-wrap gap-2 px-1">
                            ${domesticTags}
                        </div>
                    </div>
                `;
            }

            // 處理外國上市公司
            if (item.foreign.length > 0) {
                const foreignTags = item.foreign.map(company => 
                    `<span class="bg-slate-100 text-slate-600 text-sm px-4 py-1.5 rounded-full border border-transparent font-medium cursor-default select-none">${company}</span>`
                ).join('');
                
                contentHTML += `
                    <div>
                        <div class="text-md font-bold text-slate-600 mb-3 bg-slate-50 p-2 rounded border-l-4 border-${item.color}-400">
                            外國上市公司 (${item.foreign.length}家)
                        </div>
                        <div class="flex flex-wrap gap-2 px-1">
                            ${foreignTags}
                        </div>
                    </div>
                `;
            }

            // 如果都沒資料 (防呆)
            if (totalCompanies === 0) {
                contentHTML = `<p class="text-slate-400 italic px-2">此類別目前暫無上市公司資料。</p>`;
            }

            return `
                <div id="companyList_${item.id}" class="company-list bg-white p-6 rounded-xl border border-slate-200 shadow-sm hidden ring-2 ring-${item.color}-200">
                    <p class="font-bold text-slate-700 text-lg mb-6 flex items-center gap-2 border-b border-slate-100 pb-3">
                        <span class="w-3 h-3 rounded-full bg-${item.color}-500"></span>
                        ${item.text} <span class="text-sm font-normal text-slate-500 ml-2">(共 ${totalCompanies} 家)</span>
                    </p>
                    ${contentHTML}
                </div>
            `;
        }).join('');

        document.getElementById('company-lists').innerHTML += companyListsHTML;

        // 列表切換功能
        function toggleCompanyList(listId) {
            const allLists = document.querySelectorAll('.company-list');
            allLists.forEach(list => {
                if (list.id !== listId) list.classList.add('hidden');
            });
            const companyListDiv = document.getElementById(listId);
            if (companyListDiv) {
                companyListDiv.classList.toggle('hidden');
                // 讓畫面平滑滾動到結果區域
                companyListDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
